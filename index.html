<style>
:root{
  --teal:#1B6B70; --teal-d:#0E4A4F; --teal-deep:#082E32;
  --cream:#EDE4C8; --gold:#E8B84B; --gold-d:#d4a533;
  --ink:#0E2A2C; --muted:#6c8587; --line:#e3ecec;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  font-family:'Poppins',-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--ink);
  background:radial-gradient(1200px 700px at 15% -10%, #237b80 0%, var(--teal-d) 45%, var(--teal-deep) 100%);
  background-attachment:fixed;
  min-height:100vh; min-height:100dvh;
  display:flex; align-items:center; justify-content:center;
  padding:max(1rem, env(safe-area-inset-top)) 1rem max(1rem, env(safe-area-inset-bottom));
  position:relative; overflow-x:hidden;
}
body::before,body::after{
  content:""; position:fixed; border-radius:50%; filter:blur(2px); opacity:.07; pointer-events:none;
}
body::before{width:420px;height:420px;background:var(--gold);top:-120px;right:-120px}
body::after{width:360px;height:360px;background:var(--cream);bottom:-140px;left:-100px}

.card{
  position:relative; width:100%; max-width:460px;
  background:rgba(255,255,255,.96);
  border-radius:24px;
  box-shadow:0 30px 60px -15px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.4) inset;
  overflow:hidden;
  animation:rise .6s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

.hero{
  position:relative; text-align:center;
  padding:1.5rem 1.25rem 1.25rem;
  background:var(--teal-deep);
}
.hero img{
  width:min(180px, 52vw); height:auto; display:block; margin:0 auto;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.4));
  animation:float 4.5s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.hero .tag{
  display:inline-block; margin-top:.8rem;
  background:var(--gold); color:#5a3d06;
  font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  padding:7px 16px; border-radius:999px;
  box-shadow:0 4px 12px rgba(0,0,0,.25);
}

.body{padding:1.5rem 1.25rem 1.6rem}

.field{margin-bottom:.9rem}
.field label{
  display:block; font-size:12px; font-weight:600; color:var(--muted);
  letter-spacing:.03em; margin-bottom:6px; text-transform:uppercase;
}
.field label small{font-weight:500;text-transform:none;letter-spacing:0;color:#a4b6b6}
.input-wrap{position:relative}
.input-wrap .dollar{
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  color:var(--teal); font-weight:700; font-size:16px; pointer-events:none;
}
.field input{
  width:100%; padding:13px 14px 13px 30px;
  font-family:inherit; font-size:16px; font-weight:600; color:var(--ink);
  border:2px solid var(--line); border-radius:13px; background:#fbfdfd;
  outline:none; transition:border-color .18s, box-shadow .18s;
}
.field input:hover{border-color:#cfe0e0}
.field input:focus{border-color:var(--teal); background:#fff; box-shadow:0 0 0 4px rgba(27,107,112,.12)}

.steps{
  margin:1.2rem 0 1rem; padding:1rem;
  background:linear-gradient(180deg,#f4f9f9,#eef5f5);
  border:1px solid var(--line); border-radius:16px;
  font-size:13px; display:flex; flex-direction:column; gap:9px;
}
.steps .row{display:flex; justify-content:space-between; align-items:center; gap:10px}
.steps .row .k{color:var(--muted); display:flex; align-items:center; gap:8px; font-weight:500; min-width:0}
.steps .row .k span.txt{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.steps .row .k .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex:none}
.steps .row .v{font-weight:700; font-variant-numeric:tabular-nums; color:var(--teal-d); flex:none}
.steps .divider{height:1px;background:var(--line)}

.results{display:flex; flex-direction:column; gap:12px}
.price{
  position:relative; overflow:hidden;
  border-radius:18px; padding:1.15rem 1.25rem;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.price .meta{display:flex; align-items:center; gap:11px; min-width:0}
.price .ic{
  width:38px; height:38px; border-radius:11px; flex:none;
  display:flex; align-items:center; justify-content:center;
}
.price .ic svg{width:20px;height:20px}
.price .txt{min-width:0}
.price .ttl{font-size:13px; font-weight:700; line-height:1.2}
.price .sub{font-size:10.5px; letter-spacing:.04em; text-transform:uppercase; margin-top:2px; opacity:.8}
.price .val{font-size:clamp(22px,6.5vw,27px); font-weight:800; font-variant-numeric:tabular-nums; flex:none; line-height:1}

.price.cash{
  background:linear-gradient(135deg,var(--teal) 0%, var(--teal-d) 100%);
  box-shadow:0 14px 30px -12px rgba(14,74,79,.6);
}
.price.cash::after{content:"";position:absolute;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.06);top:-65px;right:-45px}
.price.cash .ic{background:rgba(255,255,255,.16)}
.price.cash .ic svg{stroke:#fff}
.price.cash .ttl, .price.cash .val{color:#fff}
.price.cash .sub{color:var(--cream)}

.price.card{
  background:#fff; border:2px solid var(--gold);
  box-shadow:0 10px 24px -14px rgba(232,184,75,.7);
}
.price.card .ic{background:rgba(232,184,75,.18)}
.price.card .ic svg{stroke:var(--gold-d)}
.price.card .ttl{color:var(--ink)}
.price.card .val{color:var(--teal-d)}
.price.card .sub{color:#a07f1c}

.copy-btn{
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; margin-top:1rem; padding:13px;
  font-family:inherit; font-size:13.5px; font-weight:700; letter-spacing:.02em;
  color:#5a3d06; background:linear-gradient(135deg,var(--gold),var(--gold-d));
  border:none; border-radius:13px; cursor:pointer;
  box-shadow:0 8px 18px -6px rgba(232,184,75,.7); transition:transform .15s, box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
}
.copy-btn:hover{transform:translateY(-2px); box-shadow:0 12px 22px -6px rgba(232,184,75,.8)}
.copy-btn:active{transform:translateY(0) scale(.99)}
.copy-btn svg{width:15px;height:15px;flex:none}

.foot{
  text-align:center; padding:.9rem; font-size:10px; color:#a4b6b6;
  letter-spacing:.05em; border-top:1px solid var(--line);
}

@media (max-width:380px){
  .body{padding:1.25rem 1rem 1.4rem}
  .hero{padding:1.25rem 1rem 1.1rem}
  .steps{font-size:12px}
  .price{padding:1rem}
  .price .ic{width:34px;height:34px}
}
</style>
</head>

    <span class="tag">Calculadora de Equipamento</span>
  </div>
  <div class="body">
    <div class="field">
      <label>Valor do equipamento <small>(antes da tax)</small></label>
      <div class="input-wrap"><span class="dollar">$</span>
        <input type="number" id="equip" value="2000" min="0" step="50" inputmode="decimal" /></div>
    </div>
    <div class="field">
      <label>Miscelâneo</label>
      <div class="input-wrap"><span class="dollar">$</span>
        <input type="number" id="misc" value="300" min="0" step="50" inputmode="decimal" /></div>
    </div>
    <div class="field">
      <label>Labor <small>(900 – 1500)</small></label>
      <div class="input-wrap"><span class="dollar">$</span>
        <input type="number" id="labor" value="900" min="0" step="50" inputmode="decimal" /></div>
    </div>

    <div class="steps">
      <div class="row"><span class="k"><span class="dot"></span><span class="txt">Equipamento + tax 7%</span></span><span class="v" id="r0">—</span></div>
      <div class="divider"></div>
      <div class="row"><span class="k"><span class="dot"></span><span class="txt">+ miscelâneo</span></span><span class="v" id="r1">—</span></div>
      <div class="divider"></div>
      <div class="row"><span class="k"><span class="dot"></span><span class="txt">× 1.1</span></span><span class="v" id="r2">—</span></div>
      <div class="divider"></div>
      <div class="row"><span class="k"><span class="dot"></span><span class="txt">+ labor</span></span><span class="v" id="r3">—</span></div>
      <div class="divider"></div>
      <div class="row"><span class="k"><span class="dot"></span><span class="txt">× 1.5</span></span><span class="v" id="r4">—</span></div>
    </div>

    <div class="results">
      <div class="price cash">
        <div class="meta">
          <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/></svg></div>
          <div class="txt"><div class="ttl">Zelle · Check · Cash</div><div class="sub">À vista</div></div>
        </div>
        <div class="val" id="cashVal">—</div>
      </div>
      <div class="price card">
        <div class="meta">
          <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg></div>
          <div class="txt"><div class="ttl">Cartão</div><div class="sub">+4%</div></div>
        </div>
        <div class="val" id="cardVal">—</div>
      </div>
    </div>

    <button class="copy-btn" id="copyBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span id="copyLabel">Copiar os dois valores</span>
    </button>
  </div>
  <div class="foot">ALPHA BREEZY HEATING &amp; COOLING</div>
</div>

<script>
function fmt(n){return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function calc(){
  var e=parseFloat(document.getElementById('equip').value)||0;
  var m=parseFloat(document.getElementById('misc').value)||0;
  var l=parseFloat(document.getElementById('labor').value)||0;
  var s0=e*1.07;
  var s1=s0+m;
  var s2=s1*1.1;
  var s3=s2+l;
  var cash=s3*1.5;
  var card=cash*1.04;
  document.getElementById('r0').textContent=fmt(s0);
  document.getElementById('r1').textContent=fmt(s1);
  document.getElementById('r2').textContent=fmt(s2);
  document.getElementById('r3').textContent=fmt(s3);
  document.getElementById('r4').textContent=fmt(cash);
  document.getElementById('cashVal').textContent=fmt(cash);
  document.getElementById('cardVal').textContent=fmt(card);
}
['equip','misc','labor'].forEach(function(id){document.getElementById(id).addEventListener('input',calc);});
document.getElementById('copyBtn').addEventListener('click',function(){
  var cash=document.getElementById('cashVal').textContent;
  var card=document.getElementById('cardVal').textContent;
  var txt='Zelle/Check/Cash: '+cash+'  |  Cartão: '+card;
  navigator.clipboard.writeText(txt).then(function(){
    var lab=document.getElementById('copyLabel'); var o=lab.textContent;
    lab.textContent='Copiado!'; setTimeout(function(){lab.textContent=o;},1500);
  });
});
calc();
</script>
</body>
</html>
